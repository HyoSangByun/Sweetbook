spring:
  application:
    name: sweetbook-server
  datasource:
    url: ${DB_URL:jdbc:h2:mem:sweetbook;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  flyway:
    enabled: true
    locations: classpath:db/migration
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: ${PHOTO_MAX_FILE_SIZE_BYTES:10485760}
      max-request-size: ${PHOTO_MAX_FILE_SIZE_BYTES:10485760}

server:
  port: ${SERVER_PORT:8080}

app:
  sweetbook:
    base-url: ${SWEETBOOK_API_BASE_URL:https://api-sandbox.sweetbook.com}
    api-key: ${SWEETBOOK_SANDBOX_API_KEY}
    book-spec-uid: ${SWEETBOOK_BOOK_SPEC_UID}
    webhook-secret: ${SWEETBOOK_WEBHOOK_SECRET:}
    webhook-timestamp-tolerance: ${SWEETBOOK_WEBHOOK_TIMESTAMP_TOLERANCE:5m}
    connect-timeout: ${SWEETBOOK_CONNECT_TIMEOUT:3s}
    read-timeout: ${SWEETBOOK_READ_TIMEOUT:10s}
  photo:
    storage-dir: ${PHOTO_STORAGE_DIR:uploads/activity-photos}
    max-file-size-bytes: ${PHOTO_MAX_FILE_SIZE_BYTES:10485760}

