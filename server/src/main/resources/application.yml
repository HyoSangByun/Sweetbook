spring:
  application:
    name: sweetbook-server
  datasource:
    url: ${DB_URL:jdbc:h2:mem:sweetbook;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:}
    driver-class-name: org.h2.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
    show-sql: false
  h2:
    console:
      enabled: true
  servlet:
    multipart:
      max-file-size: ${PHOTO_MAX_FILE_SIZE_BYTES:10485760}
      max-request-size: ${PHOTO_MAX_FILE_SIZE_BYTES:10485760}

server:
  port: ${SERVER_PORT:8080}

app:
  jwt:
    secret: ${JWT_SECRET:please-change-this-secret-key-to-at-least-32-bytes}
    access-token-expiration-seconds: ${JWT_ACCESS_TOKEN_EXPIRATION_SECONDS:3600}
  sweetbook:
    base-url: ${SWEETBOOK_API_BASE_URL:https://api-sandbox.sweetbook.com}
    api-key: ${SWEETBOOK_SANDBOX_API_KEY:replace-with-sweetbook-api-key}
    book-spec-uid: ${SWEETBOOK_BOOK_SPEC_UID:replace-with-book-spec-uid}
  photo:
    storage-dir: ${PHOTO_STORAGE_DIR:uploads/activity-photos}
    max-file-size-bytes: ${PHOTO_MAX_FILE_SIZE_BYTES:10485760}

